name: Auto-Trigger Release of CSM go libs

on:
  workflow_dispatch:

jobs:
  release_independent_repos:
    name: Release Independent Go Libraries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [
            "khareRajshree/goiscsi",
            "khareRajshree/gonvme",
            # "khareRajshree/gocsi",
            # "khareRajshree/gofsutil",
            # "khareRajshree/gopowerstore",
            # "khareRajshree/gopowerscale",
            # "khareRajshree/gopowermax",
            # "khareRajshree/gounity",
            # "khareRajshree/goscaleio",
            # "khareRajshree/goobjectscale",
          ]
    steps:
      - name: Trigger Release of ${{ matrix.repo }}
        id: release
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: release-go-libs
          client-payload: |
            { 
              "ref": "${{ github.ref }}", 
              "sha": "${{ github.sha }}"
            }

  wait_for_completion:
    name: Wait for Independent Repo Release Completion
    runs-on: ubuntu-latest
    needs: release_independent_repos
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Install jq for parsing JSON
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Check status of triggered workflows
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          POLL_INTERVAL=60  # Check every 60 seconds
          MAX_RETRIES=5     # Maximum number of retries for a given repository
          REPO_LIST=("khareRajshree/goiscsi" "khareRajshree/gonvme")

          # Function to fetch workflow status with retries
          fetch_workflow_status() {
            local repo="$1"
            local attempt=1

            while [ $attempt -le $MAX_RETRIES ]; do
              response=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${repo}/actions/runs?event=repository_dispatch")
              
              echo "Response for ${repo}: ${response}"  # Debug output for the repository

              # Check for general errors and rate limiting
              if [[ "${response}" == *"Bad credentials"* ]]; then
                echo "Error: Bad credentials. Please check the provided GitHub token."
                exit 1
              elif [[ "${response}" == *"Not Found"* ]]; then
                echo "Error: Repository ${repo} not found. Please check the repository name and access permissions."
                exit 1
              elif [[ "${response}" == *"We couldn't respond to your request in time."* ]]; then
                echo "GitHub API timeout error for ${repo}. Retrying attempt ${attempt}/${MAX_RETRIES} after exponential backoff..."
                sleep $((POLL_INTERVAL * attempt))  # Exponential backoff
                attempt=$((attempt + 1))
                continue
              fi

              # Extract the workflow run for the specific 'release-go-libs' workflow
              workflow_run=$(echo "${response}" | jq -r '.workflow_runs[] | select(.name == "release-go-libs")')

              if [ -z "$workflow_run" ]; then
                echo "No matching workflow run found for 'release-go-libs' in ${repo}. Retrying..."
                sleep "$POLL_INTERVAL"
                continue
              fi

              status=$(echo "$workflow_run" | jq -r '.status')
              conclusion=$(echo "$workflow_run" | jq -r '.conclusion')

              if [ "${status}" == "completed" ]; then
                if [ "${conclusion}" == "success" ]; then
                  echo "Workflow 'release-go-libs' completed successfully for ${repo}."
                  return 0
                else
                  echo "Workflow 'release-go-libs' failed for ${repo}."
                  exit 1
                fi
              else
                echo "Workflow 'release-go-libs' not completed yet for ${repo}. Waiting for $POLL_INTERVAL seconds..."
                sleep "$POLL_INTERVAL"
              fi
            done

            echo "Max retries exceeded for ${repo}. Exiting."
            exit 1
          }

          # Process each repo in the list
          for repo in "${REPO_LIST[@]}"; do
            echo "Checking workflow status for ${repo}..."
            fetch_workflow_status "${repo}"
          done

  release_dependent_repo:
    name: Release Dependent Go Libraries
    runs-on: ubuntu-latest
    needs: [wait_for_completion]
    strategy:
      matrix:
        repo: ["khareRajshree/gobrick"]
    steps:
      - name: Trigger Release of ${{ matrix.repo }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: release-go-libs
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}"
            }
