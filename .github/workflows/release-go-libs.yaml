# Trigger workflow for auto-release of CSM projects
name: Auto-Trigger Release of CSM go libs

on:
  workflow_dispatch:

jobs:
  release_independent_repos:
    name: Release Independent Go Libraries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [
            "khareRajshree/goiscsi",
            "khareRajshree/gonvme",
            # "khareRajshree/gocsi",
            # "khareRajshree/gofsutil",
            # "khareRajshree/gopowerstore",
            # "khareRajshree/gopowerscale",
            # "khareRajshree/gopowermax",
            # "khareRajshree/gounity",
            # "khareRajshree/goscaleio",
            # "khareRajshree/goobjectscale",
          ]
    steps:
      - name: Trigger Release of ${{ matrix.repo }}
        id: release
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: release-go-libs
          client-payload: |
            { 
              "ref": "${{ github.ref }}", 
              "sha": "${{ github.sha }}"
            }

  # wait_for_completion:
  #   name: Wait for Independent Repos Release Completion
  #   runs-on: ubuntu-latest
  #   needs: [release_independent_repos]
  #   steps:
  #     - name: Wait 10 minutes
  #       run: sleep 600 # Sleep for 10 minutes (600 seconds)

  wait_for_completion:
    name: Wait for Independent Repo Release Completion
    runs-on: ubuntu-latest
    needs: release_independent_repos
    steps:
      - name: Check status of triggered workflows
        run: |
          chmod +x poll_workflows.sh
          ./poll_workflows.sh "${{ secrets.PERSONAL_ACCESS_TOKEN }}"

  release_dependent_repo:
    name: Release Dependent Go Libraries
    runs-on: ubuntu-latest
    needs: [wait_for_completion, release_independent_repos]
    strategy:
      matrix:
        repo: ["khareRajshree/gobrick"]
    steps:
      - name: Trigger Release of ${{ matrix.repo }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: release-go-libs
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}"
            }
