  wait_for_completion:
    name: Wait for Independent Repo Release Completion
    runs-on: ubuntu-latest
    needs: release_independent_repos
    steps:
      - name: Check status of triggered workflows
        run: |
          # GitHub access token
          GITHUB_TOKEN=${{ secrets.PERSONAL_ACCESS_TOKEN }}
          POLL_INTERVAL=60  # Check every 60 seconds

          # List of repositories to check
          declare -a repos=("khareRajshree/goiscsi" "khareRajshree/gonvme")
          WORKFLOW_NAME="release-go-libs"
          WORKFLOW_FILE="release.yaml" # The workflow file name

          for repo in "${repos[@]}"; do
            echo "Checking workflow status for $repo..."

            # Function to get the workflow ID from the workflow file name
            get_workflow_id() {
              local workflows=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${repo}/actions/workflows")
              local workflow_id=$(echo "$workflows" | jq -r '.workflows[] | select(.path | contains($file)) | .id')
              echo $workflow_id
            }

            while true; do
              workflow_id=$(get_workflow_id)
              if [ -z "$workflow_id" ]; then
                echo "No workflow ID found for $WORKFLOW_FILE in $repo. Retrying..."
                sleep "$POLL_INTERVAL"
                continue
              fi

              # Get the latest workflow run status for the specific workflow ID
              response=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${repo}/actions/workflows/${workflow_id}/runs?status=in_progress")

              # Check for authentication errors
              if [[ "${response}" == *"Bad credentials"* ]]; then
                echo "Error: Bad credentials. Please check the provided GitHub token."
                exit 1
              fi

              # Parse the JSON response to list in-progress workflows
              workflow_runs=$(echo "${response}" | jq -c '.workflow_runs[]')
              if [ -z "${workflow_runs}" ]; then
                echo "No in-progress workflows found for $WORKFLOW_FILE in $repo."
                break
              else
                echo "In-progress workflows for $WORKFLOW_FILE in $repo:"
                echo "${workflow_runs}" | jq -r '. | "\(.id): \(.html_url) - \(.status)"'
              fi

              status=$(echo "${workflow_runs}" | jq -r '[.status] | first')
              conclusion=$(echo "${workflow_runs}" | jq -r '[.conclusion] | first')

              echo "Current status for $repo: $status, conclusion: $conclusion"

              if [ "${status}" == "completed" ]; then
                if [ "${conclusion}" == "success" ]; then
                  echo "Workflow completed successfully for $repo."
                  break
                else
                  echo "Workflow failed for $repo."
                  exit 1
                fi
              else
                echo "Workflow not completed yet for $repo. Waiting for $POLL_INTERVAL seconds..."
                sleep "$POLL_INTERVAL"
              fi
            done
          done

  release_dependent_repo:
    name: Release Dependent Go Libraries
    runs-on: ubuntu-latest
    needs: [wait_for_completion, release_independent_repos]
    strategy:
      matrix:
        repo: ["khareRajshree/gobrick"]
    steps:
      - name: Trigger Release of ${{ matrix.repo }}
