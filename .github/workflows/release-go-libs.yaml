# Trigger workflow for auto-release of CSM projects
name: Auto-Trigger Release of CSM go libs

on:
  workflow_dispatch:

jobs:
  release_independent_repos:
    name: Release Independent Go Libraries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [
            "khareRajshree/goiscsi",
            "khareRajshree/gonvme",
            # "khareRajshree/gocsi",
            # "khareRajshree/gofsutil",
            # "khareRajshree/gopowerstore",
            # "khareRajshree/gopowerscale",
            # "khareRajshree/gopowermax",
            # "khareRajshree/gounity",
            # "khareRajshree/goscaleio",
            # "khareRajshree/goobjectscale",
          ]
    steps:
      - name: Trigger Release of ${{ matrix.repo }}
        id: release
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: release-go-libs
          client-payload: |
            { 
              "ref": "${{ github.ref }}", 
              "sha": "${{ github.sha }}"
            }

  # wait_for_completion:
  #   name: Wait for Independent Repos Release Completion
  #   runs-on: ubuntu-latest
  #   needs: [release_independent_repos]
  #   steps:
  #     - name: Wait 10 minutes
  #       run: sleep 600 # Sleep for 10 minutes (600 seconds)

  wait_for_completion:
    name: Wait for Independent Repo Release Completion
    runs-on: ubuntu-latest
    needs: release_independent_repos
    steps:
      - name: Check status of triggered workflows
        run: |
          # List of repositories to check
          declare -a repos=("khareRajshree/goiscsi" "khareRajshree/gonvme")

          # GitHub access token
          GITHUB_TOKEN="${1}"
          POLL_INTERVAL=60  # Check every 60 seconds

          # Fetch the repository list
          repos=$(curl -s "${REPO_LIST_URL}")

          if [ -z "$repos" ]; then
            echo "Failed to fetch repository list."
            exit 1
          fi

          # Process each line in the repository list
          IFS=$'\n'
          for repo in ${repos}; do
            # Remove any surrounding whitespace
            repo=$(echo "${repo}" | xargs)
            
            # Skip empty lines or commented lines
            if [ -z "$repo" ] || [[ "$repo" == \#* ]]; then
              continue
            fi

            echo "Checking workflow status for $repo..."

            while true; do
              # Get the latest workflow run status for the specific workflow name and event type
              response=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${repo}/actions/runs?event=repository_dispatch")
              
              echo "Response for ${repo}: ${response}"

              # Check for authentication errors
              if [[ "${response}" == *"Bad credentials"* ]]; then
                echo "Error: Bad credentials. Please check the provided GitHub token."
                exit 1
              fi

              # Extract the workflow run for the specific 'release-go-libs' workflow
              workflow_run=$(echo "${response}" | jq -r '.workflow_runs[] | select(.name == "release-go-libs")')

              if [ -z "$workflow_run" ]; then
                echo "No matching workflow run found for 'release-go-libs' in $repo. Retrying..."
                sleep "$POLL_INTERVAL"
                continue
              fi

              # Parse the JSON response to get the workflow run status
              status=$(echo "${response}" | jq -r '.workflow_runs[0].status')
              echo "status: $status"
              conclusion=$(echo "${response}" | jq -r '.workflow_runs[0].conclusion')
              echo "conclusion: $conclusion"

              if [ "${status}" == "completed" ]; then
                if [ "${conclusion}" == "success" ]; then
                  echo "Workflow completed successfully for $repo."
                  break
                else
                  echo "Workflow failed for $repo."
                  exit 1
                fi
              else
                echo "Workflow not completed yet for $repo. Waiting for $POLL_INTERVAL seconds..."
                sleep "$POLL_INTERVAL"
              fi
            done
          done

  release_dependent_repo:
    name: Release Dependent Go Libraries
    runs-on: ubuntu-latest
    needs: [wait_for_completion, release_independent_repos]
    strategy:
      matrix:
        repo: ["khareRajshree/gobrick"]
    steps:
      - name: Trigger Release of ${{ matrix.repo }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: release-go-libs
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}"
            }
