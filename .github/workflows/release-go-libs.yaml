# Trigger workflow for auto-release of CSM projects
name: Auto-Trigger Release of CSM go libs

on:
  workflow_dispatch:

jobs:
  release_independent_repos:
    name: Release Independent Go Libraries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [
            "khareRajshree/goiscsi",
            "khareRajshree/gonvme",
            # "khareRajshree/gocsi",
            # "khareRajshree/gofsutil",
            # "khareRajshree/gopowerstore",
            # "khareRajshree/gopowerscale",
            # "khareRajshree/gopowermax",
            # "khareRajshree/gounity",
            # "khareRajshree/goscaleio",
            # "khareRajshree/goobjectscale",
          ]
    steps:
      - name: Trigger Release of ${{ matrix.repo }}
        id: release
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: release-go-libs
          client-payload: |
            { 
              "ref": "${{ github.ref }}", 
              "sha": "${{ github.sha }}"
            }

  # wait_for_completion:
  #   name: Wait for Independent Repos Release Completion
  #   runs-on: ubuntu-latest
  #   needs: [release_independent_repos]
  #   steps:
  #     - name: Wait 10 minutes
  #       run: sleep 600 # Sleep for 10 minutes (600 seconds)

  wait_for_completion:
    name: Wait for Independent Repo Release Completion
    runs-on: ubuntu-latest
    needs: release_independent_repos
    steps:
      - name: Check status of triggered workflows
        run: |
          # URL to fetch the repository list
          REPO_LIST_URL="https://raw.githubusercontent.com/khareRajshree/common-github-actions/main/.github/configs/dell-libraries-list.txt"

          # GitHub access token
          GITHUB_TOKEN="${1}"
          POLL_INTERVAL=60  # Check every 60 seconds

          # Fetch the repository list
          repos=$(curl -s "${REPO_LIST_URL}")

          for repo in "${repos[@]}"; do
            echo "Checking workflow status for $repo..."

            while true; do
              # Get the latest workflow run status for the specified event type
              response=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${repo}/actions/runs?event=repository_dispatch")

              # Parse the JSON response to get the workflow run status
              status=$(echo "${response}" | jq -r '.workflow_runs[0].status')
              conclusion=$(echo "${response}" | jq -r '.workflow_runs[0].conclusion')

              if [ "${status}" == "completed" ]; then
                if [ "${conclusion}" == "success" ]; then
                  echo "Workflow completed successfully for $repo."
                  break
                else
                  echo "Workflow failed for $repo."
                  exit 1
                fi
              else
                echo "Workflow not completed yet for $repo. Waiting for $POLL_INTERVAL seconds..."
                sleep "$POLL_INTERVAL"
              fi
            done
          done

  release_dependent_repo:
    name: Release Dependent Go Libraries
    runs-on: ubuntu-latest
    needs: [wait_for_completion, release_independent_repos]
    strategy:
      matrix:
        repo: ["khareRajshree/gobrick"]
    steps:
      - name: Trigger Release of ${{ matrix.repo }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: release-go-libs
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}"
            }
