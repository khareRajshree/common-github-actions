# Trigger workflow for auto-release of CSM projects
name: Auto-Trigger Release of CSM go libs

on:
  workflow_dispatch:

jobs:
  release_independent_repos:
    name: Release Independent Go Libraries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          [
            "khareRajshree/goiscsi",
            "khareRajshree/gonvme",
            "khareRajshree/gocsi",
            "khareRajshree/gofsutil",
            "khareRajshree/gopowerstore",
            "khareRajshree/gopowerscale",
            "khareRajshree/gopowermax",
            "khareRajshree/gounity",
            "khareRajshree/goscaleio",
            "khareRajshree/goobjectscale",
          ]
    steps:
      - name: Trigger Release of ${{ matrix.repo }}
        id: release
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: release-go-libs
          client-payload: |
            { 
              "ref": "${{ github.ref }}", 
              "sha": "${{ github.sha }}"
            }
      - name: Check status of triggered workflows for release of ${{ matrix.repo }}
        if: ${{ contains('["khareRajshree/goiscsi", "khareRajshree/gonvme"]', matrix.repo) }}
        run: |
          pwd
          echo $GITHUB_WORKSPACE
          cd $GITHUB_WORKSPACE/.github/scripts/
          pwd
          chmod +x check_workflow_status.sh
          bash check_workflow_status.sh ${{ secrets.PERSONAL_ACCESS_TOKEN }} ${{ matrix.repo }}
        shell: bash

  release_dependent_repo:
    name: Release Dependent Go Libraries
    runs-on: ubuntu-latest
    needs: release_independent_repos
    strategy:
      matrix:
        repo: ["khareRajshree/gobrick"]
    steps:
      - name: Trigger Release of ${{ matrix.repo }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: release-go-libs
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}"
            }
      - name: Check status of triggered workflows for release of ${{ matrix.repo }}
        run: |
          cd $GITHUB_WORKSPACE/.github/scripts/
          chmod +x check_workflow_status.sh
          ./check_workflow_status.sh ${{ secrets.PERSONAL_ACCESS_TOKEN }} ${{ matrix.repo }}
